name: github-actions -> GHCR

on: 
  workflow_dispatch:
    inputs:
      # BASE_IMAGE is the full user/name:tag of the base FaaSr image (stored in DockerHub) to build from 
      BASE_IMAGE:
        description: 'user/name:tag of the base FaaSr image e.g. faasr/base:latest'
        required: true
      # TARGET_NAME is the name of the FaaS-specific image to build
      # Examples: github-actions-python
      TARGET_NAME:
        description: 'name of the FaaS-specific image to build'
        required: true
      # FAASR_VERSION is the FaaSr-py version tag to be used for this base FaaSr image
      FAASR_VERSION:
        description: 'FaaSr-py version'
        required: true 
      # FAASR_INSTALL_REPO is the GitHub repo to install FaaSr from
      # Examples: janedoe/FaaSr-Package-dev, faasr/FaaSr-Package
      FAASR_INSTALL_REPO:
        description: 'GitHub repo to install FaaSr-py from'
        required: true
        default: 'FaaSr/FaaSr-Backend'
      # GHCR_IO_REPO is the GitHub Container Repository (GHCR) to push image to
      GHCR_IO_REPO:
        description: 'GitHub Container Repository (GHCR) to push image to'
        required: true
        default: 'faasr'

  # ---- Added for orchestrator support ----
  workflow_call:
    inputs:
      BASE_IMAGE:
        type: string
        required: true
      TARGET_NAME:
        type: string
        required: true
      FAASR_VERSION:
        type: string
        required: true
      FAASR_INSTALL_REPO:
        type: string
        required: true
      GHCR_IO_REPO:
        type: string
        required: true

permissions: write-all

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Login to the Github Container registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ inputs.GHCR_IO_REPO }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build github-actions Container registry image
        run: |
          cd faas_specific
          docker build -f github-actions.Dockerfile -t ghcr.io/${{ inputs.GHCR_IO_REPO }}/${{ inputs.TARGET_NAME }}:${{ inputs.FAASR_VERSION }} --build-arg BASE_IMAGE=${{ inputs.BASE_IMAGE }} --build-arg FAASR_VERSION=${{ inputs.FAASR_VERSION }} --build-arg FAASR_INSTALL_REPO=${{ inputs.FAASR_INSTALL_REPO }} .
      - name: Push github-actions image to GitHub Container registry
        run: |
          docker push ghcr.io/${{ inputs.GHCR_IO_REPO }}/${{ inputs.TARGET_NAME }}:${{ inputs.FAASR_VERSION }}