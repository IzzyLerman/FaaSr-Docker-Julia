name: openwhisk -> DockerHub

on: 
  workflow_dispatch:
    inputs:
      # BASE_IMAGE is the full user/name:tag of the base FaaSr image (stored in DockerHub) to build from 
      # Examples: janedoe/base-tidyverse:1.1.2, faasr/base-tidyverse:1.1.3
      BASE_IMAGE:
        description: 'base image e.g. public.ecr.aws/lambda/python:3.13'
        required: true
      # TARGET_NAME is the name of the FaaS-specific image to build
      # Examples: aws-lambda-tidyverse
      TARGET_NAME:
        description: 'name of the FaaS-specific image to build'
        required: true
      # FAASR_VERSION is the FaaSr version tag to be used for this base FaaSr image
      # Examples: 1.1.2, 1.3.1
      FAASR_VERSION:
        description: 'FaaSr version'
        required: true 
      # FAASR_INSTALL_REPO is the GitHub repo to install FaaSr from
      # Examples: janedoe/FaaSr-Package-dev, faasr/FaaSr-Package
      FAASR_INSTALL_REPO:
        description: 'GitHub repo to install FaaSr from'
        required: true
        default: 'FaaSr/FaaSr-Backend'

  # ---- Added for orchestrator support ----
  workflow_call:
    inputs:
      BASE_IMAGE:
        type: string
        required: true
      TARGET_NAME:
        type: string
        required: true
      FAASR_VERSION:
        type: string
        required: true
      FAASR_INSTALL_REPO:
        type: string
        required: true
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

permissions: write-all

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Login to Docker Hub 
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build Openwhisk Container image
        run: |
          cd faas_specific
          docker build -f openwhisk.Dockerfile -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.TARGET_NAME }}:${{ inputs.FAASR_VERSION }} --build-arg BASE_IMAGE=${{ inputs.BASE_IMAGE }} --build-arg FAASR_VERSION=${{ inputs.FAASR_VERSION }} --build-arg FAASR_INSTALL_REPO=${{ inputs.FAASR_INSTALL_REPO }} .
      - name: Push Openwhisk image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.TARGET_NAME }}:${{ inputs.FAASR_VERSION }}