name: aws-lambda -> ECR

on: 
  workflow_dispatch:
    inputs:
      # BASE_IMAGE is the full user/name:tag of the base FaaSr image (stored in DockerHub) to build from
      BASE_IMAGE:
        description: 'user/name:tag of the base FaaSr image e.g. faasr/base:latest'
        required: true
      # TARGET_NAME is the name of the FaaS-specific image to build
      # Examples: aws-lambda-tidyverse
      TARGET_NAME:
        description: 'name of the FaaS-specific image to build'
        required: true
      # FAASR_VERSION is the FaaSr version tag to be used for this base FaaSr image
      # Examples: 1.1.2, 1.3.1
      FAASR_VERSION:
        description: 'FaaSr version'
        required: true 
      # FAASR_INSTALL_REPO is the GitHub repo to install FaaSr from
      # Examples: janedoe/FaaSr-Package-dev, faasr/FaaSr-Package
      FAASR_INSTALL_REPO:
        description: 'GitHub repo to install FaaSr from'
        required: true
        default: 'FaaSr/FaaSr-Backend'
      # AWS_REGION is the AWS ECR region to push image to
      # Examples: us-east-1
      AWS_REGION:
        description: 'AWS ECR region to push image to'
        required: true
        default: 'us-east-1'

  # ---- Added for orchestrator support ----
  workflow_call:
    inputs:
      BASE_IMAGE:
        type: string
        required: true
      TARGET_NAME:
        type: string
        required: true
      FAASR_VERSION:
        type: string
        required: true
      FAASR_INSTALL_REPO:
        type: string
        required: true
      AWS_REGION:
        type: string
        required: true
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true

permissions: write-all

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.AWS_REGION }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build aws-lambda Container registry image
        run: |
          cd faas_specific
          docker build -f aws-lambda.Dockerfile -t ${{ steps.login-ecr.outputs.registry }}/${{ inputs.TARGET_NAME }}:${{ inputs.FAASR_VERSION }} --build-arg BASE_IMAGE=${{ inputs.BASE_IMAGE }} --build-arg FAASR_VERSION=${{ inputs.FAASR_VERSION }} --build-arg FAASR_INSTALL_REPO=${{ inputs.FAASR_INSTALL_REPO }} .
      - name: Push aws-lambda image to ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ inputs.TARGET_NAME }}:${{ inputs.FAASR_VERSION }}